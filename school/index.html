<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Ward & Xyland Taylor — Da Vinci Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: url('https://github.com/zryzenzzzz/ryanward.org/blob/main/Pics/screenshot-2019-01-18-at-10-33-57-am_1.png?raw=true') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #ffffff;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(10,15,30,0.78) 0%, rgba(10,15,30,0.55) 30%, rgba(10,15,30,0.42) 55%, rgba(10,15,30,0.58) 80%, rgba(10,15,30,0.85) 100%);
      z-index: 0;
    }

    /* ── Particles ── */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }
    @keyframes floatParticle {
      0% { transform: translateY(110vh) translateX(0) scale(0); opacity: 0; }
      8%  { opacity: 1; }
      50% { transform: translateY(50vh) translateX(30px) scale(1); }
      92% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(-20px) scale(0.5); opacity: 0; }
    }

    /* ── Simple Back Arrow ── */
    .back-arrow {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 1000;
      color: #ffffff;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .back-arrow:hover {
      background: rgba(255,255,255,0.18);
      transform: translateX(-4px);
    }
    .back-arrow svg {
      width: 24px;
      height: 24px;
      stroke: #ffffff;
      stroke-width: 2.5;
      transition: transform 0.3s ease;
    }
    .back-arrow:hover svg {
      transform: translateX(-3px);
    }

    /* ── Top Header ── */
    .top-header {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 40px 20px 30px;
      text-align: center;
    }
    .davinci-logo-top {
      width: 140px;
      height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 6px 24px rgba(255,215,0,0.3));
      margin-bottom: 16px;
      animation: logoPulseTop 6s ease-in-out infinite;
    }
    @keyframes logoPulseTop {
      0%, 100% { filter: drop-shadow(0 6px 24px rgba(255,215,0,0.3)); }
      50%      { filter: drop-shadow(0 8px 40px rgba(255,215,0,0.55)); }
    }
    .school-name {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 8px;
      text-shadow: 0 3px 20px rgba(0,0,0,0.8);
    }
    .school-tagline {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* ── Main Content ── */
    .main-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 240px);
      padding: 40px 20px 100px;
    }

    /* ── Emblem Section ── */
    .emblem-section {
      position: relative;
      margin-bottom: 60px;
    }
    .emblem-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 380px; height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.10) 0%, transparent 70%);
      animation: glowBreath 6s ease-in-out infinite;
    }
    @keyframes glowBreath {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
    }
    .emblem-logo {
      width: 280px;
      height: 280px;
      object-fit: contain;
      position: relative;
      z-index: 5;
      filter: drop-shadow(0 0 35px rgba(0,0,0,0.6));
      animation: emblemFloat 8s ease-in-out infinite;
      transition: transform 0.4s ease;
    }
    .emblem-logo:hover {
      transform: scale(1.06);
    }
    @keyframes emblemFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-16px); }
    }

    /* ── Campaign Text ── */
    .campaign-block {
      text-align: center;
      max-width: 900px;
    }
    .candidate-name {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 64px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 1px;
      color: #ffffff;
      text-shadow: 0 4px 25px rgba(0,0,0,0.7);
      margin-bottom: 4px;
    }
    .ampersand {
      font-size: 52px;
      font-style: normal;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      display: block;
      margin: 8px 0;
    }
    .for-label {
      display: block;
      font-size: 16px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 12px;
      color: rgba(255,255,255,0.6);
      margin: 28px 0 12px;
    }
    .position-title {
      display: block;
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: #ffffff;
    }

    /* ── Footer ── */
    .footer-bar {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 20px 0;
      text-align: center;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
    }
    .footer-bar p {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* ── Flag Stripe ── */
    .flag-stripe {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 4px;
      z-index: 999;
      display: flex;
    }
    .flag-stripe span { flex: 1; }
    .flag-stripe span:nth-child(1) { background: #BF0A30; }
    .flag-stripe span:nth-child(2) { background: #FFFFFF; }
    .flag-stripe span:nth-child(3) { background: #002868; }
    .flag-stripe span:nth-child(4) { background: #FFD700; }
    .flag-stripe span:nth-child(5) { background: #BF0A30; }

    /* Responsive */
    @media (max-width: 768px) {
      .back-arrow { top: 16px; left: 16px; width: 44px; height: 44px; }
      .back-arrow svg { width: 22px; height: 22px; }
      .davinci-logo-top { width: 100px; height: 100px; }
      .school-name { font-size: 26px; letter-spacing: 5px; }
      .candidate-name { font-size: 46px; }
      .ampersand { font-size: 38px; }
      .position-title { font-size: 24px; }
      .emblem-logo { width: 220px; height: 220px; }
      .emblem-glow { width: 300px; height: 300px; }
    }
    @media (max-width: 480px) {
      .candidate-name { font-size: 36px; }
      .ampersand { font-size: 30px; }
      .for-label { font-size: 13px; letter-spacing: 8px; }
      .position-title { font-size: 20px; letter-spacing: 4px; }
      .emblem-logo { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Back Arrow -->
  <a href="https://ryanward.org" class="back-arrow" title="Back to ryanward.org">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </a>

  <!-- Top Header -->
  <header class="top-header">
    <img src="https://github.com/zryzenzzzz/ryanward.org/blob/main/Pics/Davinci.png?raw=true" alt="Da Vinci Connect Logo" class="davinci-logo-top">
    <h1 class="school-name">Da Vinci Connect</h1>
    <p class="school-tagline">Student Government Election 2026</p>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="emblem-section">
      <div class="emblem-glow"></div>
      <img src="https://github.com/zryzenzzzz/ryanward.org/blob/main/Pics/121212e.png?raw=true" alt="Campaign Emblem" class="emblem-logo">
    </div>

    <div class="campaign-block">
      <h2 class="candidate-name">Ryan Ward</h2>
      <span class="ampersand">&</span>
      <h2 class="candidate-name">Xyland Taylor</h2>
      <span class="for-label">— for —</span>
      <span class="position-title">President & Vice President</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-bar">
    <p>Da Vinci Connect — Leadership That Matters</p>
  </footer>

  <!-- Flag Stripe -->
  <div class="flag-stripe">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <script>
    // Generate particles
    (function () {
      const container = document.getElementById('particles');
      const count = 35;
      const palette = [
        'rgba(255,215,0,0.5)',
        'rgba(255,255,255,0.35)',
        'rgba(255,165,0,0.4)',
        'rgba(255,223,100,0.45)',
        'rgba(255,200,50,0.4)'
      ];
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 12 + 8) + 's';
        p.style.animationDelay = (Math.random() * 18) + 's';
        p.style.background = palette[Math.floor(Math.random() * palette.length)];
        container.appendChild(p);
      }
    })();
  </script>
</body>
</html>
